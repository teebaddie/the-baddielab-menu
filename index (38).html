async function fsGet() {
  try {
    const r = await fetch(FS_URL + "?key=" + FS_KEY);
    if (r.status === 404 || r.status === 400) return null;
    const d = await r.json();
    return d.fields && d.fields.value ? d.fields.value.stringValue : null;
  } catch(e) { return null; }
}

async function fsSet(value) {
  const r = await fetch(FS_URL + "?key=" + FS_KEY + "&updateMask.fieldPaths=value", {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ fields: { value: { stringValue: value } } })
  });
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  return true;
}

const fmt = n => "₦" + Math.max(0, Number(n)).toLocaleString("en-NG", { minimumFractionDigits: 2 });
const clone = o => JSON.parse(JSON.stringify(o));

function sortedAlpha(data) {
  const cats = Object.keys(data).sort((a, b) => a.localeCompare(b));
  const out = {};
  cats.forEach(cat => { out[cat] = [...data[cat]].sort((a, b) => a.name.localeCompare(b.name)); });
  return out;
}

function buildFromStored(stored) {
  if (!stored) return sortedAlpha(clone(DEFAULT_SERVICES));
  const out = {};
  const order = stored.categories || Object.keys(DEFAULT_SERVICES);
  // Load stored categories
  order.forEach(cat => {
    const s = stored.services && stored.services[cat];
    const defs = DEFAULT_SERVICES[cat] || [];
    if (s && Array.isArray(s)) {
      out[cat] = s.map(si => {
        const def = defs.find(d => d.name === si.name);
        return def ? { ...def, price: Number(si.price) || 0 } : { name: si.name, price: Number(si.price) || 0 };
      });
    } else { out[cat] = clone(defs); }
  });
  // Merge in any new default categories not yet in storage
  Object.keys(DEFAULT_SERVICES).forEach(cat => {
    if (!out[cat]) out[cat] = clone(DEFAULT_SERVICES[cat]);
  });
  return sortedAlpha(out);
}

function serialize(catOrder, prices) {
  const svcs = {};
  catOrder.forEach(cat => { svcs[cat] = (prices[cat] || []).map(({ name, price }) => ({ name, price })); });
  return JSON.stringify({ categories: catOrder, services: svcs });
}

                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                          <span style={{ color: PINK, fontSize: 13 }}>₦</span>
                          <input className="fi" type="number" min="0" value={svc.price} onChange={e => setPrice(cat, idx, e.target.value)}
                            style={{ width: 120, padding: "8px 10px", background: "#000", border: "1px solid #2a2a2a", borderRadius: 8, color: "#fff", fontSize: 13, fontFamily: "inherit", textAlign: "right" }} />
                          <button className="db" onClick={() => deleteSvc(cat, idx)}
                            style={{ ...b, width: 28, height: 28, borderRadius: 6, border: "1px solid #2a2a2a", background: "transparent", color: "#555", fontSize: 13 }}>🗑</button>
                        </div>
                      </div>
                    ))}
                    {!searching && (isAdding ? (
                      <div style={{ padding: "14px 16px", borderTop: "1px solid #1a1a1a", background: "rgba(243,194,215,0.03)" }}>
                        <div style={{ fontSize: 11, color: PINK, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 }}>New Service</div>
                        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                          <input autoFocus className="fi" placeholder="Service name" value={addForm.name} onChange={e => setAddForm(p => ({ ...p, name: e.target.value }))}
                            style={{ flex: 2, minWidth: 140, padding: "9px 12px", background: "#000", border: "1px solid #2a2a2a", borderRadius: 8, color: "#fff", fontSize: 13, fontFamily: "inherit" }} />
                          <div style={{ position: "relative", flex: 1, minWidth: 110 }}>
                            <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", color: PINK, fontSize: 12 }}>₦</span>
                            <input className="fi" type="number" min="0" placeholder="Price" value={addForm.price} onChange={e => setAddForm(p => ({ ...p, price: e.target.value }))} onKeyDown={e => e.key === "Enter" && addSvc(cat)}
                              style={{ width: "100%", padding: "9px 10px 9px 24px", background: "#000", border: "1px solid #2a2a2a", borderRadius: 8, color: "#fff", fontSize: 13, fontFamily: "inherit" }} />
                          </div>
                          <button onClick={() => addSvc(cat)} style={{ ...b, padding: "9px 18px", background: PINK, border: "none", borderRadius: 8, color: "#000", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>Add</button>
                          <button onClick={() => setAddForm(null)} style={{ ...b, padding: "9px 13px", background: "transparent", border: "1px solid #333", borderRadius: 8, color: "#666", fontSize: 12, flexShrink: 0 }}>Cancel</button>
                        </div>
                      </div>
                    ) : (
                      <button onClick={() => { setAddForm({ cat, name: "", price: "" }); setEditOpenCat(cat); }}
                        style={{ ...b, width: "100%", padding: 11, background: "transparent", border: "none", borderTop: "1px solid #1a1a1a", color: PINK, fontFamily: "inherit", fontSize: 12, cursor: "pointer" }}
                        onMouseEnter={e => e.currentTarget.style.background = "rgba(243,194,215,0.04)"}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                        + Add Service to {cat}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            );
          })}

          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#000", borderTop: "1px solid rgba(192,57,43,0.25)", padding: "12px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", zIndex: 100 }}>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => setShowAddCat(true)} style={{ ...b, padding: "8px 14px", background: "rgba(243,194,215,0.08)", border: "1px solid rgba(243,194,215,0.25)", borderRadius: 16, color: PINK, fontFamily: "inherit", fontSize: 11 }}>+ Category</button>
              <button onClick={openBulkAdd} style={{ ...b, padding: "8px 14px", background: "rgba(243,194,215,0.08)", border: "1px solid rgba(243,194,215,0.25)", borderRadius: 16, color: PINK, fontFamily: "inherit", fontSize: 11 }}>Bulk Add</button>
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              {saveStatus === "saved" && <span style={{ fontSize: 12, color: "#7a9e7a" }}>✓ Saved</span>}
              <button onClick={handleSave} style={{ ...b, padding: "9px 22px", background: PINK, border: "none", borderRadius: 20, color: "#000", fontSize: 12, fontWeight: 700 }}>Save All Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* STICKY BILL BAR */}
      {selItems.length > 0 && activeTab === "select" && (
        <div onClick={() => setActiveTab("checkout")} style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#000", borderTop: "1px solid rgba(243,194,215,0.3)", padding: "13px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", zIndex: 100 }}>
          <div>
            <div style={{ fontSize: 11, color: "#555", letterSpacing: 1 }}>{selItems.length} service{selItems.length !== 1 ? "s" : ""} selected</div>
            <div style={{ fontSize: 13, color: PINK, marginTop: 2 }}>
              {fmt(subtotal)}{totalDisc > 0 ? ` − ${fmt(totalDisc)}` : ""} + VAT = <strong>{fmt(finalTotal)}</strong>
            </div>
          </div>
          <div style={{ background: PINK, color: "#000", padding: "8px 18px", borderRadius: 20, fontSize: 12, fontWeight: 700, flexShrink: 0 }}>VIEW BILL →</div>
        </div>
      )}

      {showBackTop && (
        <button className="bt" onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
          style={{ ...b, position: "fixed", bottom: selItems.length > 0 && activeTab === "select" ? 78 : 22, right: 18, zIndex: 200, background: "rgba(0,0,0,0.85)", border: `1px solid ${PINK}`, color: PINK, borderRadius: "50%", width: 40, height: 40, fontSize: 17 }}>↑</button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
